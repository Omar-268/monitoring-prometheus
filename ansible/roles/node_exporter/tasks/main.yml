---
# ──────────────────────────────────────────────
# roles/node_exporter/tasks/main.yml
#
# Installs node_exporter on remote servers.
# Nothing else — no Docker, no Prometheus.
# ──────────────────────────────────────────────

- name: Create node_exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  become: true

- name: Check if node_exporter binary already exists
  ansible.builtin.stat:
    path: "{{ node_exporter_bin_dir }}/node_exporter"
  register: ne_binary

- name: Download node_exporter archive
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter.tar.gz"
    mode: "0644"
  when: not ne_binary.stat.exists
  become: true

- name: Extract node_exporter archive
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter.tar.gz"
    dest: "/tmp"
    remote_src: true
  when: not ne_binary.stat.exists
  become: true

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: "{{ node_exporter_bin_dir }}/node_exporter"
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_user }}"
    mode: "0755"
    remote_src: true
  when: not ne_binary.stat.exists
  become: true
  notify: Restart node_exporter

- name: Remove downloaded archive
  ansible.builtin.file:
    path: "/tmp/node_exporter.tar.gz"
    state: absent
  become: true

- name: Deploy node_exporter systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true
  become: true

- name: Verify node_exporter is responding
  ansible.builtin.uri:
    url: "http://localhost:{{ node_exporter_port }}/metrics"
    status_code: 200
  retries: 5
  delay: 3
  register: ne_check
  until: ne_check.status == 200
