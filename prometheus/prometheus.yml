global:
  scrape_interval: 15s
rule_files:
  - rules.yml
alerting:
  alertmanagers:
    - scheme: http
      static_configs:
        - targets: [ 'alertmanager:9093' ]
scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']
        labels:
          instance: node_exporter_container
      
      - targets: ['192.168.106.11:9100']
        labels:
          instance: server-01

      - targets: ['192.168.106.12:9100']
        labels:
          instance: server-02
      
      - targets: ['18.207.127.183:9100']
        labels:
          instance: ec2_machine
             
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          instance: nginx_container   
  
  - job_name: 'cadvisor'
    scrape_interval: 5s
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: cadvisor_container
