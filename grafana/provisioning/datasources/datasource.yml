apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      tlsAuth: false
      tlsAuthWithCACert: false

  - name: opensearch-datasource
    uid: wazuh-opensearch
    type: grafana-opensearch-datasource
    access: proxy
    url: https://192.168.106.130:9200
    basicAuth: true
    basicAuthUser: admin
    isDefault: false
    secureJsonData:
      basicAuthPassword: ${OPENSEARCH_PASSWORD}
    jsonData:
      database: "wazuh-alerts-*"
      flavor: opensearch
      timeField: "timestamp"
      logMessageField: "full_log"
      logLevelField: "rule.level"
      labelsField: "agent.name"
      tlsSkipVerify: true
      pplEnabled: true
      maxConcurrentShardRequests: 5
      version: "1.0.0"
      versionLabel: "OpenSearch (compatibility mode)"